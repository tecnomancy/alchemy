  - src/array.ts
  - src/_internal/array*.ts
  - tests/array.test.ts

object:
  - src/object.ts
  - src/_internal/object*.ts
  - tests/object.test.ts

string:
  - src/string.ts
  - src/_internal/string*.ts
  - tests/string.test.ts

async:
  - src/async.ts
  - src/_internal/async*.ts
  - tests/async.test.ts

composition:
  - src/composition.ts
  - src/_internal/pipe.ts
